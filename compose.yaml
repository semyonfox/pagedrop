services:
  seol:
    container_name: seol
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:8788:8080"
    environment:
      SEOL_TOKEN: ${SEOL_TOKEN:?set SEOL_TOKEN in .env}
      SEOL_DATA_DIR: /data
      SEOL_PUBLIC_BASE_URL: ${SEOL_PUBLIC_BASE_URL:-http://localhost:8080}
      SEOL_DEFAULT_EXPIRY: ${SEOL_DEFAULT_EXPIRY:-1d}
      SEOL_MAX_EXPIRY: ${SEOL_MAX_EXPIRY:-7d}
      SEOL_MAX_UPLOAD_BYTES: ${SEOL_MAX_UPLOAD_BYTES:-10485760}
      SEOL_MAX_EXTRACTED_BYTES: ${SEOL_MAX_EXTRACTED_BYTES:-52428800}
      SEOL_MAX_FILES: ${SEOL_MAX_FILES:-100}
      SEOL_UPLOADS_PER_MINUTE: ${SEOL_UPLOADS_PER_MINUTE:-5}
      SEOL_MAX_CONCURRENT_UPLOADS: ${SEOL_MAX_CONCURRENT_UPLOADS:-2}
      SEOL_TRUST_PROXY_HEADERS: ${SEOL_TRUST_PROXY_HEADERS:-false}
    volumes:
      - seol-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  cloudflared:
    container_name: seol-tunnel
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      seol:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  seol-data:
    name: seol-data
