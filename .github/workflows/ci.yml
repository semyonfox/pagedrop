name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
      - run: go vet ./...
      - run: go test -race ./...
      - run: test -z "$(gofmt -l cmd internal)"
      - run: docker build -t pagedrop:test .
