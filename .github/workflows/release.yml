name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {goos: linux, goarch: amd64}
          - {goos: linux, goarch: arm64}
          - {goos: darwin, goarch: amd64}
          - {goos: darwin, goarch: arm64}
          - {goos: windows, goarch: amd64}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          suffix=""
          if [ "$GOOS" = windows ]; then suffix=".exe"; fi
          go build -trimpath -ldflags="-s -w -X github.com/semyonfox/pagedrop/internal/app.version=${GITHUB_REF_NAME}" -o "pagedrop-${GOOS}-${GOARCH}${suffix}" ./cmd/pagedrop
      - uses: softprops/action-gh-release@v2
        with:
          files: pagedrop-*
